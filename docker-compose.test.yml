# Docker Compose para testes integrados (TaaC)
# Uso: docker compose -f docker-compose.test.yml up -d
# Ajuste imagens/ports ao stack do repositório.

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,sqs,lambda,secretsmanager
      - DEBUG=0
    volumes:
      - "./examples/fixtures/localstack-init:/etc/localstack/init/ready.d"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: app_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d app_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  wiremock:
    image: wiremock/wiremock:3.3.1
    ports:
      - "8089:8080"
    volumes:
      - "./examples/fixtures/wiremock:/home/wiremock"

# Rede padrão: serviços acessíveis em localhost nas ports acima.
# Nos testes: LOCALSTACK_URL=http://localhost:4566, JDBC postgres://localhost:5433/app_test
